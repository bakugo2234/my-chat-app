<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Chat - Messenger Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        #messages { scrollbar-width: thin; scrollbar-color: #888 #f1f1f1; }
        #messages::-webkit-scrollbar { width: 6px; }
        #messages::-webkit-scrollbar-thumb { background: #888; border-radius: 20px; }
        
        .message-bubble {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 18px;
            position: relative;
        }
        .own-message {
            background-color: #0084ff;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .other-message {
            background-color: #f1f1f1;
            color: black;
            border-bottom-left-radius: 4px;
        }
        
        .dark .other-message {
            background-color: #3a3b3c;
            color: #e4e6eb;
        }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-950 text-gray-900 dark:text-gray-100 min-h-screen flex flex-col">

    <div class="max-w-3xl mx-auto w-full h-screen flex flex-col shadow-2xl bg-white dark:bg-gray-900">

        <!-- Header giống Messenger -->
        <div class="bg-white dark:bg-gray-900 border-b dark:border-gray-700 px-4 py-3 flex items-center gap-3">
            <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-full flex items-center justify-center text-white font-bold text-xl">
                💬
            </div>
            <div>
                <h1 class="font-semibold text-lg">Mini Chat Room</h1>
                <p class="text-xs text-green-500 flex items-center gap-1">
                    <span class="w-2 h-2 bg-green-500 rounded-full"></span> 
                    Đang hoạt động
                </p>
            </div>
            <div class="ml-auto flex gap-4 text-gray-500">
                <i class="fa-solid fa-phone"></i>
                <i class="fa-solid fa-video"></i>
                <i class="fa-solid fa-ellipsis-v"></i>
            </div>
        </div>

        <!-- Khu vực tin nhắn -->
        <!-- Khu vực tin nhắn -->
<ul id="messages" class="flex-1 overflow-y-auto p-4 space-y-3 bg-gray-50 dark:bg-gray-950 scroll-smooth"></ul>

<!-- Loading spinner (ở đầu danh sách) -->
<div id="loading" class="hidden mx-auto mt-4 flex items-center justify-center gap-2 text-gray-500">
    <div class="w-5 h-5 border-2 border-gray-300 border-t-blue-600 rounded-full animate-spin"></div>
    <span class="text-sm">Đang tải tin nhắn cũ...</span>
</div>

        <!-- Input giống Messenger -->
        <div class="bg-white dark:bg-gray-900 border-t dark:border-gray-700 p-4">
            <form id="form" class="flex items-center gap-2 bg-gray-100 dark:bg-gray-800 rounded-3xl px-5 py-2">
                <button type="button" class="text-gray-500 hover:text-gray-700 dark:hover:text-gray-300">
                    <i class="fa-solid fa-face-smile text-xl"></i>
                </button>
                
                <input id="input" 
                       class="flex-1 bg-transparent outline-none text-base placeholder-gray-400"
                       placeholder="Aa" autocomplete="off" required />
                
                <input id="user" 
                       class="w-28 bg-transparent outline-none text-sm font-medium placeholder-gray-400"
                       placeholder="Tên bạn" required />

                <button type="submit" 
                        class="w-9 h-9 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl flex items-center justify-center transition">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </form>
            <p class="text-center text-[10px] text-gray-400 mt-2">Tin nhắn được lưu tạm thời trên server</p>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
       const socket = io();

const form = document.getElementById('form');
const input = document.getElementById('input');
const userInput = document.getElementById('user');
const messagesList = document.getElementById('messages');
const loadingSpinner = document.getElementById('loading');

let currentPage = 1;
let isLoading = false;
let hasMore = true;
let userName = '';

// Hàm thêm tin nhắn (dùng cho cả mới và cũ)
function addMessage(data, prepend = false) {
    const item = document.createElement('li');
    const isOwn = data.user === userName;
    const time = data.timestamp 
        ? new Date(data.timestamp).toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' })
        : new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });

    item.className = `flex ${isOwn ? 'justify-end' : 'justify-start'}`;

    item.innerHTML = `
        <div class="max-w-[75%]">
            ${!isOwn ? `<p class="text-xs text-gray-500 dark:text-gray-400 mb-1 ml-2">${data.user}</p>` : ''}
            <div class="message-bubble ${isOwn ? 'own-message' : 'other-message'}">
                ${data.msg}
            </div>
            <p class="text-[10px] text-gray-400 mt-1 ${isOwn ? 'text-right mr-2' : 'ml-2'}">
                ${time}
            </p>
        </div>
    `;

    if (prepend) {
        messagesList.prepend(item);   // Thêm vào đầu
    } else {
        messagesList.appendChild(item); // Thêm vào cuối
    }
}

// Khi nhận lịch sử ban đầu (30 tin mới nhất)
socket.on('chat history', (history) => {
    messagesList.innerHTML = '';
    history.forEach(msg => addMessage(msg));
    currentPage = 1;
    hasMore = true;
});

// Nhận tin nhắn mới real-time
socket.on('chat message', (data) => {
    addMessage(data);
    messagesList.scrollTop = messagesList.scrollHeight;
});

// Infinite scroll: Kéo lên trên → tải tin cũ
messagesList.addEventListener('scroll', () => {
    if (isLoading || !hasMore) return;

    // Nếu scroll gần đầu danh sách (cách đầu < 300px)
    if (messagesList.scrollTop < 300) {
        loadOlderMessages();
    }
});

async function loadOlderMessages() {
    if (isLoading || !hasMore) return;
    
    isLoading = true;
    loadingSpinner.classList.remove('hidden');

    currentPage++;

    socket.emit('load older messages', currentPage);

    // Nhận phản hồi từ server
    socket.once('older messages response', ({ page, messages: olderMsgs, hasMore: more }) => {
        if (olderMsgs.length === 0) {
            hasMore = false;
            loadingSpinner.classList.add('hidden');
            isLoading = false;
            return;
        }

        const oldHeight = messagesList.scrollHeight;

        // Thêm tin cũ vào ĐẦU danh sách (tin cũ nhất lên trên)
        olderMsgs.reverse().forEach(msg => {
            addMessage(msg, true);   // prepend = true
        });

        // Giữ vị trí scroll không bị nhảy
        messagesList.scrollTop = messagesList.scrollHeight - oldHeight;

        hasMore = more;
        isLoading = false;
        loadingSpinner.classList.add('hidden');
    });
}

// Gửi tin nhắn
form.addEventListener('submit', (e) => {
    e.preventDefault();
    if (input.value.trim() && userInput.value.trim()) {
        userName = userInput.value.trim();   // lưu tên người dùng
        socket.emit('chat message', {
            user: userName,
            msg: input.value.trim()
        });
        input.value = '';
    }
});

// Focus ô input khi load xong
window.onload = () => {
    input.focus();
};
    </script>
</body>
</html>
