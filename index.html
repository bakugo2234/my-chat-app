<!DOCTYPE html>
<html>
<head>
    <title>Socket.IO Chat</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #messages { list-style-type: none; margin: 0; padding: 0; margin-bottom: 20px; }
        #messages li { padding: 8px; margin-bottom: 5px; background: #f4f4f4; border-radius: 5px; }
        #form { display: flex; gap: 10px; }
    </style>
</head>
<body>
    <h2>Ứng dụng Chat Real-time 💬</h2>
    <ul id="messages"></ul>
    
    <form id="form">
        <input id="user" placeholder="Tên bạn" required />
        <input id="input" placeholder="Nhập tin nhắn..." autocomplete="off" required />
        <button>Gửi</button>
    </form>

    <script src="/socket.io/socket.io.js"></script>
   <script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();

    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const userInput = document.getElementById('user');
    const messagesList = document.getElementById('messages');

    // Hàm thêm tin nhắn vào giao diện
    function addMessage(data) {
        const item = document.createElement('li');
        item.textContent = `${data.user}: ${data.msg}`;
        messagesList.appendChild(item);
        window.scrollTo(0, document.body.scrollHeight);
    }

    // Khi kết nối thành công → nhận lịch sử tin nhắn cũ
    socket.on('chat history', (history) => {
        messagesList.innerHTML = ''; // xóa tin cũ trên màn hình trước khi load lịch sử
        history.forEach(msg => {
            addMessage(msg);
        });
    });

    // Nhận tin nhắn mới thời gian thực
    socket.on('chat message', (data) => {
        addMessage(data);
    });

    // Gửi tin nhắn
    form.addEventListener('submit', (e) => {
        e.preventDefault();
        if (input.value && userInput.value) {
            socket.emit('chat message', {
                user: userInput.value,
                msg: input.value
            });
            input.value = '';
        }
    });
</script>
</body>
</html>
